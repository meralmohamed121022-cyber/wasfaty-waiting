<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام انتظار عملاء وصفتي | Al-Dawaa</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- QR Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-blue: #002d62;
            --light-blue: #1e3a8a;
            --dark-blue: #001a3d;
            --key-blue: #003a80;
            --orange: #f89a1c;
            --yellow: #f8c301;
            --red: #c53030;
            --bg-gray: #f3f4f6;
            --text-gray: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background-color: #fff;
            color: #333;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        #login-screen {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
        }

        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        .logo img {
            width: 180px;
            margin-bottom: 2rem;
        }

        /* Main Screen */
        header {
            background-color: white;
            padding: 10px 25px;
            border-bottom: 2px solid var(--bg-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo-top img {
            height: 45px;
        }

        .brand-text .ar {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary-blue);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
            overflow-y: auto;
            justify-content: space-between; /* Spread elements */
        }

        /* When scanner is active, allow tighter spacing */
        body.scanner-open main {
            justify-content: flex-start;
        }

        .input-section {
            padding: 15px 20px;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .field-container {
            flex: 1;
            text-align: center;
        }

        .field-container label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--text-gray);
        }

        .field-container input {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            border: 3px solid transparent;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .field-container input.active {
            border-color: var(--orange);
            background-color: var(--dark-blue);
            box-shadow: 0 0 15px rgba(248, 154, 28, 0.4);
        }

        .scanner-trigger-area {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn-toggle-scanner {
            background-color: var(--primary-blue);
            color: white;
            border: 2px solid var(--orange);
            border-radius: 50px;
            padding: 10px 30px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .scanner-container-inline {
            display: none;
            width: 100%;
            background: #000;
            padding: 10px 0;
            flex-shrink: 0;
        }

        .scanner-frame-inline {
            position: relative;
            width: 320px;
            height: 200px;
            margin: 0 auto;
            border: 4px solid var(--orange);
            border-radius: 15px;
            overflow: hidden;
        }

        body.scanner-open .scanner-frame-inline {
            width: 260px;
            height: 150px;
        }

        /* Keyboard - Filling the space */
        .keyboard {
            background-color: #e5e7eb;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #d1d5db;
            flex-shrink: 0;
        }

        body.scanner-open .keyboard {
            padding: 5px;
            gap: 4px;
        }

        .kb-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        body.scanner-open .kb-row {
            gap: 4px;
        }

        .key {
            background-color: #fff;
            border: none;
            border-radius: 10px;
            padding: 20px 5px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            box-shadow: 0 4px 0 #9ca3af;
            cursor: pointer;
            flex: 1;
            max-width: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.1s;
        }

        body.scanner-open .key {
            padding: 12px 2px;
            font-size: 1.1rem;
            max-width: 60px;
        }

        .key:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #9ca3af;
        }

        .key.letter {
            background-color: var(--key-blue);
            color: white;
            box-shadow: 0 4px 0 #001a3d;
        }

        .key.special {
            background-color: #991b1b;
            color: white;
            box-shadow: 0 4px 0 #450a0a;
        }

        .kb-row.actions {
            margin-top: 5px;
        }

        .btn-reset, .btn-send {
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 800;
            border: none;
            border-radius: 15px;
            color: white;
            transition: 0.2s;
            cursor: pointer;
        }

        body.scanner-open .btn-reset, 
        body.scanner-open .btn-send {
            padding: 12px;
            font-size: 1.1rem;
        }

        .btn-reset { flex: 1; background-color: #dc2626; box-shadow: 0 5px 0 #991b1b; }
        .btn-send { flex: 2; background-color: var(--orange); box-shadow: 0 5px 0 #c2410c; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 45, 98, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 30px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .checkmark-circle {
            width: 100px; height: 100px;
            border-radius: 50%;
            background-color: #ecfdf5;
            border: 5px solid #10b981;
            display: flex; justify-content: center; align-items: center;
            margin: 30px auto 15px;
            font-size: 60px; color: #10b981;
        }

        .queue-num {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 10px 0;
        }

        .btn-close-modal {
            width: 100%;
            padding: 25px;
            background-color: #ef4444;
            color: white;
            border: none;
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* Custom Toggles */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 20px; width: 20px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Responsive height adjustments */
        @media (max-height: 700px) {
            .key { padding: 15px 2px; font-size: 1.2rem; }
            .field-container input { padding: 10px; font-size: 1.2rem; }
            .btn-reset, .btn-send { padding: 15px; font-size: 1.2rem; }
        }
    </style>
</head>
<body class="">

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="logo">
                <img src="https://www.al-dawaa.com/static/version1714571983/frontend/AlDawaa/default/en_US/images/logo.svg" alt="Al-Dawaa Logo">
            </div>
            <h2 style="margin-bottom: 20px; color: var(--primary-blue);">نظام انتظار عملاء وصفتي</h2>
            <div class="input-group">
                <input type="password" id="access-code" placeholder="أدخل رمز الدخول p66" style="padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-size: 1.2rem; text-align: center;">
                <button onclick="checkAccess()" style="padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer;">دخول</button>
            </div>
            <p id="login-error" style="color: var(--red); margin-top:15px; font-weight:bold;"></p>
        </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen">
        <header>
            <div class="logo-top">
                <img src="https://www.al-dawaa.com/static/version1714571983/frontend/AlDawaa/default/en_US/images/logo.svg" alt="Al-Dawaa Logo">
                <div class="brand-text">
                    <span class="ar">الدواء</span>
                </div>
            </div>
            <div style="font-size: 1rem; color: #666; font-weight: bold;">صيدلية الدواء</div>
        </header>

        <main>
            <div class="input-section">
                <div class="input-row">
                    <div class="field-container">
                        <label>رقم الوصفة PRESCRIPTION</label>
                        <input type="text" id="pres-no" placeholder="M0000000" readonly onclick="setActiveInput('pres-no')">
                    </div>
                    <div class="field-container">
                        <label>رقم الهوية ID NUMBER</label>
                        <input type="text" id="id-no" placeholder="0000000000" readonly onclick="setActiveInput('id-no')">
                    </div>
                </div>
                <div class="scanner-trigger-area">
                    <button class="btn-toggle-scanner" onclick="toggleCamera()">
                        <span id="scan-btn-text">📸 فتح ماسح QR SCANNER</span>
                    </button>
                    <button id="btn-switch-camera" class="btn-toggle-scanner" onclick="switchCamera()" style="display: none; background-color: #4b5563; border-color: #fff;">
                        <span>🔄 تبديل الكاميرا</span>
                    </button>
                    <div class="continuous-mode-inline">
                        <label class="switch">
                            <input type="checkbox" id="continuous-scan-check" checked>
                            <span class="slider"></span>
                        </label>
                        <span>مسح طابور</span>
                    </div>
                </div>
            </div>

            <!-- Built-in Scanner -->
            <div id="built-in-scanner" class="scanner-container-inline">
                <div class="scanner-frame-inline">
                    <div id="reader"></div>
                </div>
            </div>

            <!-- Keyboard -->
            <div class="keyboard">
                <div class="kb-row">
                    <button class="key" onclick="keyPress('1')">1</button>
                    <button class="key" onclick="keyPress('2')">2</button>
                    <button class="key" onclick="keyPress('3')">3</button>
                    <button class="key" onclick="keyPress('4')">4</button>
                    <button class="key" onclick="keyPress('5')">5</button>
                    <button class="key" onclick="keyPress('6')">6</button>
                    <button class="key" onclick="keyPress('7')">7</button>
                    <button class="key" onclick="keyPress('8')">8</button>
                    <button class="key" onclick="keyPress('9')">9</button>
                    <button class="key" onclick="keyPress('0')">0</button>
                </div>
                <div class="kb-row">
                    <button class="key letter" onclick="keyPress('q')">q</button>
                    <button class="key letter" onclick="keyPress('w')">w</button>
                    <button class="key letter" onclick="keyPress('e')">e</button>
                    <button class="key letter" onclick="keyPress('r')">r</button>
                    <button class="key letter" onclick="keyPress('t')">t</button>
                    <button class="key letter" onclick="keyPress('y')">y</button>
                    <button class="key letter" onclick="keyPress('u')">u</button>
                    <button class="key letter" onclick="keyPress('i')">i</button>
                    <button class="key letter" onclick="keyPress('o')">o</button>
                    <button class="key letter" onclick="keyPress('p')">p</button>
                </div>
                <div class="kb-row">
                    <button class="key letter" onclick="keyPress('a')">a</button>
                    <button class="key letter" onclick="keyPress('s')">s</button>
                    <button class="key letter" onclick="keyPress('d')">d</button>
                    <button class="key letter" onclick="keyPress('f')">f</button>
                    <button class="key letter" onclick="keyPress('g')">g</button>
                    <button class="key letter" onclick="keyPress('h')">h</button>
                    <button class="key letter" onclick="keyPress('j')">j</button>
                    <button class="key letter" onclick="keyPress('k')">k</button>
                    <button class="key letter" onclick="keyPress('l')">l</button>
                </div>
                <div class="kb-row">
                    <button class="key special" onclick="keyPress('backspace')">⌫</button>
                    <button class="key letter" onclick="keyPress('z')">z</button>
                    <button class="key letter" onclick="keyPress('x')">x</button>
                    <button class="key letter" onclick="keyPress('c')">c</button>
                    <button class="key letter" onclick="keyPress('v')">v</button>
                    <button class="key letter" onclick="keyPress('b')">b</button>
                    <button class="key letter" onclick="keyPress('n')">n</button>
                    <button class="key letter" onclick="keyPress('m')">m</button>
                </div>
                <div class="kb-row actions">
                    <button class="btn-reset" onclick="resetInputs()">إعادة تعيين</button>
                    <button class="btn-send" onclick="sendData()">إرسال</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="queue-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="checkmark-circle">✓</div>
            <h3 style="color: #666; font-size: 1.2rem;">تم تسجيلك بنجاح</h3>
            <div id="queue-number-display" class="queue-num" style="font-size: 5rem; font-weight: 900; color: var(--primary-blue);">1</div>
            <button class="btn-close-modal" onclick="closeQueueModal()">إغلاق</button>
        </div>
    </div>

    <script>
        let activeInputId = 'pres-no';
        let html5QrCode = null;
        let isProcessing = false; 
        let currentFacingMode = "user";

        function getPersistentQueueNumber() {
            const today = new Date().toLocaleDateString();
            const savedDate = localStorage.getItem('queueDate');
            let count = parseInt(localStorage.getItem('queueCount')) || 1;
            if (savedDate !== today) {
                count = 1;
                localStorage.setItem('queueDate', today);
                localStorage.setItem('queueCount', count);
            }
            return count;
        }

        let currentQueueNumber = getPersistentQueueNumber();

        function incrementQueueNumber() {
            currentQueueNumber++;
            localStorage.setItem('queueCount', currentQueueNumber);
        }

        function checkAccess() {
            if (document.getElementById('access-code').value === 'p66') {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('main-screen').classList.add('active');
                setActiveInput('pres-no');
            } else {
                document.getElementById('login-error').textContent = "⚠️ رمز الدخول غير صحيح";
            }
        }

        function setActiveInput(id) {
            activeInputId = id;
            document.querySelectorAll('.field-container input').forEach(input => input.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const letterKeys = document.querySelectorAll('.key.letter');
            if (id === 'id-no') letterKeys.forEach(k => k.classList.add('faded'));
            else letterKeys.forEach(k => k.classList.remove('faded'));
        }

        function keyPress(key) {
            const input = document.getElementById(activeInputId);
            let val = input.value;
            if (key === 'backspace') { input.value = val.slice(0, -1); return; }
            if (activeInputId === 'pres-no') {
                if (val.length === 0) { if (/[a-z]/i.test(key)) input.value += key.toLowerCase(); }
                else if (val.length < 8) { if (/[0-9]/.test(key)) input.value += key; }
            } else if (activeInputId === 'id-no') {
                if (/[0-9]/.test(key) && val.length < 10) input.value += key;
            }
        }

        function resetInputs() {
            document.getElementById('pres-no').value = '';
            document.getElementById('id-no').value = '';
            setActiveInput('pres-no');
        }

        function sendData() {
            if (isProcessing) return;
            const pres = document.getElementById('pres-no').value;
            const id = document.getElementById('id-no').value;
            if (pres.length < 8 || id.length < 10) { alert("يرجى إكمال البيانات أولاً!"); return; }
            showQueueModal();
        }

        function showQueueModal() {
            isProcessing = true;
            document.getElementById('queue-number-display').textContent = currentQueueNumber;
            document.getElementById('queue-modal').style.display = 'flex';
            incrementQueueNumber();
            setTimeout(() => { isProcessing = false; }, 2000);
        }

        function closeQueueModal() {
            document.getElementById('queue-modal').style.display = 'none';
            resetInputs();
        }

        function toggleCamera() {
            const scannerDiv = document.getElementById('built-in-scanner');
            const switchBtn = document.getElementById('btn-switch-camera');
            const btnText = document.getElementById('scan-btn-text');
            
            if (scannerDiv.style.display === 'none' || scannerDiv.style.display === '') {
                scannerDiv.style.display = 'block';
                switchBtn.style.display = 'inline-block';
                btnText.textContent = "❌ إغلاق الكاميرا";
                document.body.classList.add('scanner-open');
                startScanner();
            } else {
                scannerDiv.style.display = 'none';
                switchBtn.style.display = 'none';
                btnText.textContent = "📸 فتح ماسح QR SCANNER";
                document.body.classList.remove('scanner-open');
                if (html5QrCode) html5QrCode.stop();
            }
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            if (html5QrCode) html5QrCode.stop().then(() => startScanner());
        }

        function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: currentFacingMode }, { fps: 20, qrbox: { width: 250, height: 150 } }, (text) => {
                if (isProcessing) return;
                const idMatch = text.match(/\d{10}/);
                if (idMatch) document.getElementById('id-no').value = idMatch[0];
                const presMatch = text.match(/[a-zA-Z]\d{7}/);
                if (presMatch) document.getElementById('pres-no').value = presMatch[0].toLowerCase();
                showQueueModal();
                if (!document.getElementById('continuous-scan-check').checked) toggleCamera();
            }).catch(err => console.error(err));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MONOShare | Premium File Transfer</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root {
      --dark-blue: #001f3f;
      --orange: #ff851b;
      --white: #ffffff;
      --gray-light: #f4f7f6;
      --accent-blue: #0074d9;
      --text-main: #333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--dark-blue);
      color: var(--white);
      line-height: 1.6;
      padding-bottom: 40px;
    }

    /* Header */
    header {
      background: var(--dark-blue);
      color: var(--white);
      padding: 40px 20px;
      text-align: center;
      border-bottom: 3px solid var(--orange);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    h1 span {
      color: var(--orange);
    }

    .container {
      max-width: 1000px;
      margin: -20px auto 0;
      padding: 0 15px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    /* Connection Banner */
    .ip-banner {
      background: var(--white);
      border-radius: 20px;
      padding: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .ip-info {
      flex: 1;
    }

    .ip-info p {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .ip-link {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark-blue);
      text-decoration: none;
      word-break: break-all;
      border-bottom: 3px solid var(--orange);
    }

    .qr-code {
      width: 130px;
      height: 130px;
      background: #f9f9f9;
      background: var(--white);
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* CSS Art for Scanner */
    .scanner-container {
      position: relative;
      display: none;
      margin-top: 15px;
      border-radius: 20px;
      overflow: hidden;
      border: 3px solid var(--accent-blue);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      width: 100%;
      background: #000;
    }
    .scan-line {
      width: 100%;
      height: 2px;
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange), 0 0 20px var(--orange);
      position: absolute;
      top: 0;
      animation: scan 2.5s infinite linear;
      z-index: 10;
    }
    @keyframes scan {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: var(--orange);
      border-style: solid;
      z-index: 10;
    }
    .top-left { top: 15px; left: 15px; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
    .top-right { top: 15px; right: 15px; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
    .bottom-left { bottom: 15px; left: 15px; border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
    .bottom-right { bottom: 15px; right: 15px; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }
    #reader video {
      border-radius: 17px;
      object-fit: cover;
    }

    /* Upload Section */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.02);
    }

    h2 {
      color: var(--dark-blue);
      font-size: 1.3rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    /* Upload Area */
    .drop-zone {
      border: 3px dashed #d1d5db;
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #fafafa;
      color: #6b7280;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      background: #fff8f1;
      border-color: var(--orange);
      color: var(--orange);
    }

    .drop-zone i {
      font-size: 3rem;
      margin-bottom: 15px;
      display: block;
    }

    .drop-zone input {
      display: none;
    }

    .btn {
      background: var(--dark-blue);
      color: var(--white);
      border: none;
      padding: 16px 24px;
      border-radius: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      font-size: 1.1rem;
      font-weight: 700;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:hover {
      background: #002d5a;
    }

    .btn-orange {
      background: var(--orange);
    }

    .btn-orange:hover {
      background: #e67716;
    }

    .progress {
      height: 12px;
      background: #eee;
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), #ffb347);
      width: 0%;
      transition: width 0.1s;
    }

    /* File List */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .refresh-btn {
      background: #eee;
      color: var(--dark-blue);
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .delete-all-btn {
      color: #ef4444;
      background: none;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .file-item {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 18px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .file-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }

    .file-preview {
      width: 100%;
      height: 160px;
      background: #f8f9fa;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .file-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .file-preview .icon {
      font-size: 3rem;
      color: #ccc;
    }

    .preview-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
      color: white;
      font-weight: bold;
    }

    .file-preview:hover .preview-overlay {
      opacity: 1;
    }

    .file-details {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-weight: 700;
      color: var(--dark-blue);
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .file-meta {
      font-size: 0.8rem;
      color: #888;
      display: flex;
      gap: 10px;
    }

    .file-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn-download {
      background: var(--dark-blue);
      color: white;
    }

    .btn-delete {
      background: #fee2e2;
      color: #ef4444;
    }

    /* Lightbox/Modal */
    #lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 31, 63, 0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox-content {
      max-width: 90%;
      max-height: 85vh;
      border-radius: 15px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    #msg { text-align: center; margin-top: 15px; font-weight: 600; }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: var(--dark-blue);
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid var(--orange);
      animation: toastIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
      pointer-events: auto;
    }
    @keyframes toastIn {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast.error { border-bottom-color: #ef4444; }

    /* Custom Confirmation Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 31, 63, 0.8);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }
    .modal-card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: modalPop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
    }
    @keyframes modalPop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
    .modal-title { font-weight: 800; font-size: 1.4rem; color: var(--dark-blue); margin-bottom: 10px; }
    .modal-text { color: #666; margin-bottom: 25px; }
    .modal-btns { display: flex; gap: 12px; }
    .m-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .m-btn-cancel { background: #eee; color: #333; }
    .m-btn-confirm { background: #ef4444; color: white; }

    /* Day Labels */
    .day-label {
      grid-column: 1 / -1;
      font-weight: 800;
      color: var(--orange);
      font-size: 1rem;
      margin-top: 25px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--orange);
      display: inline-block;
      width: auto;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .ip-banner {
        flex-direction: column;
        text-align: center;
      }

      .container {
        margin-top: -10px;
      }

      .file-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>MONO<span>Share</span></h1>
  </header>

  <div class="container">

    <!-- Connection Banner -->
    <div class="ip-banner" style="margin-bottom: 25px;">
      <div class="ip-info">
        <p>📱 Scan to connect from phone:</p>
        <a href="http://{{ server_ip }}:5000" class="ip-link" id="serverLink">http://{{ server_ip }}:5000</a>
      </div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://{{ server_ip }}:5000" alt="QR Code"
        class="qr-code">
    </div>

    <!-- QR Scanner Section -->
    <div class="card" id="scanner-card" style="text-align: center; margin-bottom: 25px;">
      <h2 style="justify-content: center;"><span>📷</span> Connect to another device</h2>
      <button class="btn btn-orange" id="start-scan-btn" onclick="startScanner()">🔍 Scan QR Code</button>
      
      <div class="scanner-container" id="scanner-container">
        <div id="reader" style="width: 100%;"></div>
        <div class="scan-line" id="scan-line"></div>
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
      </div>
      
      <button class="btn" id="stop-scan-btn" onclick="stopScanner()" style="display: none; background: #ef4444; margin-top: 15px;">⏹ Stop Scanner</button>
    </div>

    <!-- Upload Section -->
    <div class="card">
      <h2><span>⬆️</span> Upload Files</h2>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" onchange="handleFile(this.files[0])">
        <i style="font-style: normal; font-size: 3rem;">📁</i>
        <p>Drag and drop or tap to select</p>
      </div>
      <div id="selected-name" style="margin-top: 15px;"></div>
      <div class="progress" id="progressWrapper">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <button class="btn btn-orange" onclick="uploadFile()">📤 Start Upload</button>
      <div id="msg"></div>
    </div>

    <!-- Files Section -->
    <div class="card">
      <div class="toolbar">
        <h2><span>📥</span> Shared Files</h2>
        <button class="refresh-btn" onclick="loadFiles()">🔄 Refresh</button>
      </div>

      <div class="file-grid" id="fileGrid">
        <!-- Files will be loaded here -->
      </div>

      <div style="margin-top: 30px; text-align: center;">
        <button class="delete-all-btn" onclick="deleteAll()">🗑️ Delete All Shared Files</button>
      </div>
    </div>

  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <div id="lightbox-container" onclick="event.stopPropagation()">
      <!-- Content injected via JS -->
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <span class="modal-icon" id="modalIcon">🗑️</span>
      <div class="modal-title" id="modalTitle">Are you sure?</div>
      <div class="modal-text" id="modalText">This action cannot be undone.</div>
      <div class="modal-btns">
        <button class="m-btn m-btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="m-btn m-btn-confirm" id="modalConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    let selectedFile = null;

    // UI Tools
    function showToast(text, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${text}`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        toast.style.transition = '0.4s';
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    let modalCallback = null;
    function openModal(title, text, icon, callback) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalText').textContent = text;
      document.getElementById('modalIcon').textContent = icon;
      document.getElementById('modalOverlay').style.display = 'flex';
      modalCallback = callback;
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    document.getElementById('modalConfirmBtn').onclick = () => {
      if (modalCallback) modalCallback();
      closeModal();
    };

    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        closeModal();
        closeLightbox();
      }
      if (e.key === "Enter") {
        // If modal is open, confirm it
        if (document.getElementById('modalOverlay').style.display === 'flex') {
          document.getElementById('modalConfirmBtn').click();
        } 
        // If file selected but not uploading, start upload
        else if (selectedFile && document.getElementById('progressWrapper').style.display !== 'block') {
          uploadFile();
        }
      }
    });

    // Click Outside to Close
    window.onclick = (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    };

    // Drag and Drop
    const dropZone = document.getElementById("dropZone");
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
      dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
    });
    dropZone.addEventListener("dragover", () => dropZone.classList.add('drag-over'));
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener("drop", e => {
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) {
        handleFile(file);
        showToast("File detected, starting upload...");
        uploadFile();
      }
    });

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      document.getElementById("selected-name").innerHTML = `<b>Selected:</b> ${file.name} (${formatSize(file.size)})`;
      document.getElementById("progressBar").style.width = "0%";
      document.getElementById("progressWrapper").style.display = "none";
    }

    function uploadFile() {
      if (!selectedFile) { alert("Please select a file first!"); return; }

      const formData = new FormData();
      formData.append("file", selectedFile);

      const xhr = new XMLHttpRequest();
      document.getElementById("progressWrapper").style.display = "block";

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          document.getElementById("progressBar").style.width = pct + "%";
        }
      };

      xhr.onload = () => {
        if (xhr.status === 200) {
          showToast("File uploaded successfully!");
          selectedFile = null;
          document.getElementById("selected-name").textContent = "";
          document.getElementById("fileInput").value = "";
          setTimeout(() => { document.getElementById("progressWrapper").style.display = "none"; }, 1500);
          loadFiles();
        } else {
          showToast("Upload failed!", "error");
        }
      };

      xhr.onerror = () => {
        showToast("Network Error!", "error");
      };

      xhr.open("POST", "/upload");
      xhr.send(formData);
    }

    function isImage(name) {
      return /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name);
    }

    function isVideo(name) {
      return /\.(mp4|webm|ogg|mov)$/i.test(name);
    }

    function loadFiles() {
      fetch("/files").then(r => r.json()).then(files => {
        const grid = document.getElementById("fileGrid");
        if (files.length === 0) {
          grid.innerHTML = '<p style="grid-column:1/-1; color:#999; text-align:center; padding:40px;">No files shared yet. Start uploading!</p>';
          return;
        }

        const groups = {}, order = [];
        files.forEach(f => {
          const k = getDayLabel(f.date);
          if (!groups[k]) { groups[k] = [], order.push(k); }
          groups[k].push(f);
        });

        let html = "";
        order.forEach(k => {
          html += `<div class="day-label">${k}</div>`;
          groups[k].forEach(f => {
            const previewUrl = `/download/${encodeURIComponent(f.name)}`;
            let previewContent = '<div class="icon">📄</div>';

            if (isImage(f.name)) {
              previewContent = `<img src="${previewUrl}" alt="preview">`;
            } else if (isVideo(f.name)) {
              previewContent = '<div class="icon">🎬</div>';
            }

            html += `
              <div class="file-item">
                <div class="file-preview" onclick="openPreview('${f.name}')">
                  ${previewContent}
                  <div class="preview-overlay">VIEW</div>
                </div>
                <div class="file-details">
                  <div class="file-name" title="${f.name}">${f.name}</div>
                  <div class="file-meta">
                    <span>${formatSize(f.size)}</span>
                    <span>🕒 ${formatTime(f.date)}</span>
                  </div>
                </div>
                <div class="file-actions">
                  <button class="action-btn btn-download" onclick="window.location='${previewUrl}'">⬇️ Save</button>
                  <button class="action-btn btn-delete" onclick="deleteFile('${f.name}')">🗑️</button>
                </div>
              </div>`;
          });
        });
        grid.innerHTML = html;
      });
    }

    function openPreview(name) {
      const url = `/download/${encodeURIComponent(name)}`;
      const container = document.getElementById("lightbox-container");
      let content = "";

      if (isImage(name)) {
        content = `<img src="${url}" class="lightbox-content">`;
      } else if (isVideo(name)) {
        content = `<video src="${url}" controls autoplay class="lightbox-content" style="max-width:100%"></video>`;
      } else {
        window.location = url;
        return;
      }

      container.innerHTML = content;
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
      document.getElementById("lightbox-container").innerHTML = "";
    }

    function deleteFile(name) {
      openModal(
        "Delete File?",
        `Are you sure you want to delete "${name}"?`,
        "🗑️",
        () => {
          fetch("/delete/" + encodeURIComponent(name), { method: "DELETE" }).then(() => {
            showToast("File deleted");
            loadFiles();
          });
        }
      );
    }

    function deleteAll() {
      openModal(
        "Delete ALL Files?",
        "This will permanently remove everything shared. Are you sure?",
        "⚠️",
        () => {
          fetch("/delete-all", { method: "DELETE" }).then(() => {
            showToast("All files deleted");
            loadFiles();
          });
        }
      );
    }

    function formatTime(dateStr) {
      if (!dateStr || dateStr === "—") return "—";
      const d = new Date(dateStr.replace(" ", "T"));
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function getDayLabel(dateStr) {
      if (!dateStr || dateStr === "—") return "Recent";
      const d = new Date(dateStr.replace(" ", "T"));
      const today = new Date();
      if (d.toDateString() === today.toDateString()) return "Today";
      const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
      return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1048576).toFixed(1) + " MB";
    }

    let html5QrCode = null;

    function startScanner() {
      document.getElementById("scanner-container").style.display = "block";
      document.getElementById("start-scan-btn").style.display = "none";
      document.getElementById("stop-scan-btn").style.display = "block";
      
      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }
      
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText, decodedResult) => {
          stopScanner();
          showToast("Connected! Redirecting...");
          setTimeout(() => {
            window.location.href = decodedText;
          }, 1000);
        },
        (errorMessage) => {
          // parse error, ignore
        }
      ).catch((err) => {
        console.error(err);
        showToast("Error or camera access denied.", "error");
        stopScanner();
      });
    }

    function stopScanner() {
      if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          html5QrCode = null;
          hideScannerUI();
        }).catch(err => {
          console.error("Failed to stop scanner. ", err);
          html5QrCode = null;
          hideScannerUI();
        });
      } else {
        if (html5QrCode) html5QrCode.clear();
        html5QrCode = null;
        hideScannerUI();
      }
    }
    
    function hideScannerUI() {
      document.getElementById("scanner-container").style.display = "none";
      document.getElementById("start-scan-btn").style.display = "block";
      document.getElementById("stop-scan-btn").style.display = "none";
    }

    loadFiles();
    setInterval(loadFiles, 10000); // Auto-refresh every 10s
  </script>
</body>

</html>

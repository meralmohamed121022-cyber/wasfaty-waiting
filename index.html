<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام انتظار عملاء وصفتي | Al-Dawaa</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.comhkh/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- QR Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Cordova Script -->
    <script src="cordova.js"></script>

    <style>
        :root {
            --primary-blue: #002d62;
            --light-blue: #1e3a8a;
            --dark-blue: #001a3d;
            --key-blue: #003a80;
            --orange: #f89a1c;
            --yellow: #f8c301;
            --red: #c53030;
            --bg-gray: #f3f4f6;
            --text-gray: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background-color: #fff;
            color: #333;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        #login-screen {
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            width: 85%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo img {
            width: 160px;
            margin-bottom: 1.5rem;
        }

        .login-container h2 {
            color: var(--primary-blue);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .input-group input {
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--orange);
        }

        .input-group button {
            padding: 14px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .input-group button:active {
            transform: scale(0.98);
        }

        /* Main Screen */
        header {
            background-color: white;
            padding: env(safe-area-inset-top, 10px) 20px 10px;
            border-bottom: 2px solid var(--bg-gray);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-top img {
            height: 45px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-text .ar {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary-blue);
        }

        .brand-text .en {
            font-weight: 400;
            font-size: 0.8rem;
            color: var(--orange);
            text-transform: lowercase;
        }

        /* Responsive Layout for Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
            overflow-y: auto;
        }

        .input-section {
            padding: 15px;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .input-row {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .field-container {
            flex: 1;
        }

        .field-container label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 6px;
            color: var(--text-gray);
        }

        .field-container input {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            border: 2px solid transparent;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .field-container input.active {
            border-color: var(--orange);
            box-shadow: 0 0 15px rgba(248, 154, 28, 0.3);
            background-color: var(--dark-blue);
        }

        /* Scanner Styling */
        .scanner-trigger-area {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-toggle-scanner {
            background-color: var(--primary-blue);
            color: white;
            border: 2px solid var(--orange);
            border-radius: 50px;
            padding: 10px 25px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-toggle-scanner:active {
            transform: scale(0.95);
            background-color: var(--orange);
        }

        .continuous-mode-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-gray);
            font-weight: 700;
        }

        .scanner-container-inline {
            display: none;
            width: 100%;
            background: #000;
            padding: 10px 0;
            position: relative;
        }

        .scanner-frame-inline {
            position: relative;
            width: 280px;
            height: 200px;
            margin: 0 auto;
            border: 4px solid var(--orange);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(248, 154, 28, 0.4);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--orange);
            box-shadow: 0 0 15px var(--orange);
            animation: scanMoveInline 2s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes scanMoveInline {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Improved Responsive Keyboard */
        .keyboard {
            background-color: #e5e7eb;
            padding: 12px 8px env(safe-area-inset-bottom, 12px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
            border-top: 1px solid #d1d5db;
        }

        .kb-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .key {
            background-color: #fff;
            border: none;
            border-radius: 10px;
            padding: 15px 5px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
            box-shadow: 0 3px 0 #9ca3af;
            cursor: pointer;
            flex: 1;
            max-width: 60px;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .key:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9ca3af;
            background-color: #f3f4f6;
        }

        .key.letter {
            background-color: var(--key-blue);
            color: white;
            box-shadow: 0 3px 0 #001a3d;
        }

        .key.letter:active {
            box-shadow: 0 1px 0 #001a3d;
        }

        .key.letter.faded {
            opacity: 0.2;
            filter: grayscale(1);
            pointer-events: none;
        }

        .key.special {
            background-color: #991b1b;
            color: white;
            box-shadow: 0 3px 0 #450a0a;
        }

        .kb-row.actions {
            margin-top: 5px;
        }

        .btn-reset {
            flex: 1;
            background-color: #dc2626;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 4px 0 #991b1b;
        }

        .btn-send {
            flex: 2;
            background-color: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 4px 0 #c2410c;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 45, 98, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 400px;
            border-radius: 30px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .checkmark-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ecfdf5;
            border: 6px solid #10b981;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px auto 20px;
        }

        .checkmark {
            color: #10b981;
            font-size: 60px;
            font-weight: bold;
        }

        .queue-num {
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 10px 0;
            letter-spacing: -2px;
        }

        .btn-close-modal {
            width: 100%;
            padding: 24px;
            background-color: #ef4444;
            color: white;
            border: none;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
        }

        /* Custom Toggles */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Tablet Optimizations */
        @media (min-width: 768px) {
            .input-row { gap: 30px; }
            .key { max-width: 100px; padding: 25px 10px; font-size: 1.5rem; }
            .field-container label { font-size: 1rem; }
            .field-container input { font-size: 2rem; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Access Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="logo">
                <img src="https://www.al-dawaa.com/static/version1714571983/frontend/AlDawaa/default/en_US/images/logo.svg" alt="Al-Dawaa Logo">
            </div>
            <h2>دخول موظف وصفتي</h2>
            <div class="input-group">
                <input type="password" id="access-code" placeholder="أدخل رمز الدخول p66">
                <button onclick="checkAccess()">دخول النظام</button>
            </div>
            <p id="login-error" style="color: var(--red); margin-top:10px; font-weight:bold;"></p>
        </div>
    </div>

    <!-- Main Screen -->
    <div id="main-screen" class="screen">
        <header>
            <div class="logo-top">
                <img src="https://www.al-dawaa.com/static/version1714571983/frontend/AlDawaa/default/en_US/images/logo.svg" alt="Al-Dawaa Logo">
                <div class="brand-text">
                    <span class="ar">الدواء</span>
                    <span class="en">al-dawaa</span>
                </div>
            </div>
            <div style="font-size: 0.8rem; color: #666; font-weight: bold;">فرع صيدلية الدواء</div>
        </header>

        <main>
            <div class="input-section">
                <div class="input-row">
                    <div class="field-container">
                        <label>رقم الوصفة PRESCRIPTION</label>
                        <input type="text" id="pres-no" placeholder="M0000000" readonly onclick="setActiveInput('pres-no')">
                    </div>
                    <div class="field-container">
                        <label>رقم الهوية ID NUMBER</label>
                        <input type="text" id="id-no" placeholder="0000000000" readonly onclick="setActiveInput('id-no')">
                    </div>
                </div>
                <div class="scanner-trigger-area">
                    <button class="btn-toggle-scanner" onclick="toggleCamera()">
                        <span id="scan-btn-text">📸 فتح ماسح QR SCANNER</span>
                    </button>
                    <div class="continuous-mode-inline">
                        <label class="switch">
                            <input type="checkbox" id="continuous-scan-check" checked>
                            <span class="slider"></span>
                        </label>
                        <span>مسح طابور</span>
                    </div>
                </div>
            </div>

            <!-- Built-in Scanner -->
            <div id="built-in-scanner" class="scanner-container-inline">
                <div class="scanner-frame-inline">
                    <div id="reader"></div>
                    <div class="scan-line"></div>
                </div>
            </div>

            <!-- Keyboard -->
            <div class="keyboard">
                <div class="kb-row">
                    <button class="key" onclick="keyPress('1')">1</button>
                    <button class="key" onclick="keyPress('2')">2</button>
                    <button class="key" onclick="keyPress('3')">3</button>
                    <button class="key" onclick="keyPress('4')">4</button>
                    <button class="key" onclick="keyPress('5')">5</button>
                    <button class="key" onclick="keyPress('6')">6</button>
                    <button class="key" onclick="keyPress('7')">7</button>
                    <button class="key" onclick="keyPress('8')">8</button>
                    <button class="key" onclick="keyPress('9')">9</button>
                    <button class="key" onclick="keyPress('0')">0</button>
                </div>
                <div class="kb-row">
                    <button class="key letter" onclick="keyPress('q')">q</button>
                    <button class="key letter" onclick="keyPress('w')">w</button>
                    <button class="key letter" onclick="keyPress('e')">e</button>
                    <button class="key letter" onclick="keyPress('r')">r</button>
                    <button class="key letter" onclick="keyPress('t')">t</button>
                    <button class="key letter" onclick="keyPress('y')">y</button>
                    <button class="key letter" onclick="keyPress('u')">u</button>
                    <button class="key letter" onclick="keyPress('i')">i</button>
                    <button class="key letter" onclick="keyPress('o')">o</button>
                    <button class="key letter" onclick="keyPress('p')">p</button>
                </div>
                <div class="kb-row">
                    <button class="key letter" onclick="keyPress('a')">a</button>
                    <button class="key letter" onclick="keyPress('s')">s</button>
                    <button class="key letter" onclick="keyPress('d')">d</button>
                    <button class="key letter" onclick="keyPress('f')">f</button>
                    <button class="key letter" onclick="keyPress('g')">g</button>
                    <button class="key letter" onclick="keyPress('h')">h</button>
                    <button class="key letter" onclick="keyPress('j')">j</button>
                    <button class="key letter" onclick="keyPress('k')">k</button>
                    <button class="key letter" onclick="keyPress('l')">l</button>
                </div>
                <div class="kb-row">
                    <button class="key special" onclick="keyPress('backspace')">⌫</button>
                    <button class="key letter" onclick="keyPress('z')">z</button>
                    <button class="key letter" onclick="keyPress('x')">x</button>
                    <button class="key letter" onclick="keyPress('c')">c</button>
                    <button class="key letter" onclick="keyPress('v')">v</button>
                    <button class="key letter" onclick="keyPress('b')">b</button>
                    <button class="key letter" onclick="keyPress('n')">n</button>
                    <button class="key letter" onclick="keyPress('m')">m</button>
                </div>
                <div class="kb-row actions">
                    <button class="btn-reset" onclick="resetInputs()">إعادة تعيين</button>
                    <button class="btn-send" onclick="sendData()">إرسال</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="queue-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="checkmark-circle">
                <span class="checkmark">✓</span>
            </div>
            <h3 style="color: #666;">تم تسجيلك بنجاح</h3>
            <h4 style="margin-top: 10px;">رقم الإنتظار الحالي</h4>
            <div id="queue-number-display" class="queue-num">1</div>
            <button class="btn-close-modal" onclick="closeQueueModal()">إغلاق التذكرة</button>
        </div>
    </div>

    <script>
        let activeInputId = 'pres-no';
        let html5QrCode = null;
        let isProcessing = false; 

        // --- Cordova Permissions & Initialization ---
        document.addEventListener('deviceready', onDeviceReady, false);

        function onDeviceReady() {
            console.log('Cordova is ready');
            // Check for camera permission using Cordova if needed
            if (window.cordova && cordova.plugins && cordova.plugins.permissions) {
                const permissions = cordova.plugins.permissions;
                permissions.requestPermission(permissions.CAMERA, (status) => {
                    if(!status.hasPermission) console.warn("Camera permission denied");
                }, () => {
                    console.error("Camera permission error");
                });
            }
        }
        
        function getPersistentQueueNumber() {
            const today = new Date().toLocaleDateString();
            const savedDate = localStorage.getItem('queueDate');
            let count = parseInt(localStorage.getItem('queueCount')) || 1;

            if (savedDate !== today) {
                count = 1;
                localStorage.setItem('queueDate', today);
                localStorage.setItem('queueCount', count);
            }
            return count;
        }

        let currentQueueNumber = getPersistentQueueNumber();

        function incrementQueueNumber() {
            currentQueueNumber++;
            localStorage.setItem('queueCount', currentQueueNumber);
        }

        function checkAccess() {
            const code = document.getElementById('access-code').value;
            if (code === 'p66') {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('main-screen').classList.add('active');
                setActiveInput('pres-no');
            } else {
                document.getElementById('login-error').textContent = "⚠️ رمز الدخول غير صحيح";
            }
        }

        function setActiveInput(id) {
            activeInputId = id;
            document.querySelectorAll('.field-container input').forEach(input => input.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const letterKeys = document.querySelectorAll('.key.letter');
            if (id === 'id-no') letterKeys.forEach(k => k.classList.add('faded'));
            else letterKeys.forEach(k => k.classList.remove('faded'));
        }

        function keyPress(key) {
            const input = document.getElementById(activeInputId);
            let val = input.value;
            if (key === 'backspace') { input.value = val.slice(0, -1); return; }
            if (activeInputId === 'pres-no') {
                if (val.length === 0) { if (/[a-z]/i.test(key)) input.value += key.toLowerCase(); }
                else if (val.length < 8) { if (/[0-9]/.test(key)) input.value += key; }
            } else if (activeInputId === 'id-no') {
                if (/[a-z]/i.test(key)) return;
                if (val.length < 10 && /[0-9]/.test(key)) input.value += key;
            }
        }

        function resetInputs() {
            document.getElementById('pres-no').value = '';
            document.getElementById('id-no').value = '';
            setActiveInput('pres-no');
        }

        function sendData() {
            if (isProcessing) return; 
            
            const pres = document.getElementById('pres-no').value;
            const id = document.getElementById('id-no').value;
            if (pres.length < 8 || id.length < 10) {
                alert("يرجى إكمال البيانات أولاً!");
                return;
            }
            showQueueModal();
        }

        function showQueueModal() {
            isProcessing = true; 
            document.getElementById('queue-number-display').textContent = currentQueueNumber;
            document.getElementById('queue-modal').style.display = 'flex';
            incrementQueueNumber();
            
            setTimeout(() => { isProcessing = false; }, 2000);
        }

        function closeQueueModal() {
            document.getElementById('queue-modal').style.display = 'none';
            resetInputs();
        }

        function toggleCamera() {
            const scannerDiv = document.getElementById('built-in-scanner');
            const btnText = document.getElementById('scan-btn-text');
            if (scannerDiv.style.display === 'none' || scannerDiv.style.display === '') {
                scannerDiv.style.display = 'block';
                btnText.textContent = "❌ إغلاق الكاميرا";
                startScanner();
            } else {
                scannerDiv.style.display = 'none';
                btnText.textContent = "📸 فتح ماسح QR SCANNER";
                if (html5QrCode) html5QrCode.stop().catch(err => console.error(err));
            }
        }

        function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 250, height: 180 }, aspectRatio: 1.0 };
            
            // In Cordova, facingMode "environment" is backend camera
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                if (isProcessing) return; 
                decodeQR(decodedText);
                if (!document.getElementById('continuous-scan-check').checked) toggleCamera();
            }).catch(err => {
                console.error(err);
                alert("تعذر فتح الكاميرا، يرجى التأكد من إعطاء الصلاحية.");
            });
        }

        function decodeQR(text) {
            if (isProcessing) return;
            
            if (text === "TxA1zSn4Rg5OmaYgHfEfyBqXe1g0UeLxpAXtplBPs8SrKDm2") {
                document.getElementById('id-no').value = "1037924535";
                document.getElementById('pres-no').value = "u5010640";
            } 
            else {
                const idMatch = text.match(/\d{10}/);
                if (idMatch) document.getElementById('id-no').value = idMatch[0];

                const presMatch = text.match(/[a-zA-Z]\d{7}/);
                if (presMatch) document.getElementById('pres-no').value = presMatch[0].toLowerCase();

                if (!idMatch && !presMatch) {
                    const onlyDigits = text.replace(/[^0-9]/g, '');
                    if (onlyDigits.length >= 10) {
                        document.getElementById('id-no').value = onlyDigits.substring(0, 10);
                    }
                }
            }
            showQueueModal();
        }
    </script>
